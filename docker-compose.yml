version: '3.8'

networks:
  pipeline-net:
    driver: bridge

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks:
      - pipeline-net
    environment:
      - CLUSTER_NAME=test
    ports:
      - "9870:9870"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    networks:
      - pipeline-net
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    depends_on:
      namenode:
        condition: service_healthy

  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    user: root
    networks:
      - pipeline-net
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./data:/data
      - ./jobs:/jobs
      - ./output:/output
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080\")'"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-worker
    user: root
    networks:
      - pipeline-net
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./data:/data
      - ./jobs:/jobs
      - ./output:/output
    depends_on:
      spark-master:
        condition: service_healthy

  data-generator:
    image: python:3.9-slim
    container_name: data-generator
    networks:
      - pipeline-net
    volumes:
      - ./data:/data
    command: >
      bash -c "chmod +x /data/generate_records.sh && /data/generate_records.sh && tail -f /dev/null"
    healthcheck:
      test: ["CMD", "test", "-f", "/data/cdr_data.csv"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow:
    build: .
    container_name: airflow
    networks:
      - pipeline-net
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_DB_UPGRADE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - JAVA_HOME=/usr/lib/jvm/default-java
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/data
      - ./jobs:/jobs
      - ./output:/output
    ports:
      - "8080:8080"
    command: standalone
    depends_on:
      data-generator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
